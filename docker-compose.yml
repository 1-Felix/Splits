# SPLITS — self-hosted running dashboard.
#   1. cp .env.example .env  →  set GARMIN_EMAIL / GARMIN_PASSWORD in .env
#   2. docker compose up -d
#   3. open http://localhost:8000
# Credentials are read from .env (git-ignored) — never commit them. Missing creds
# don't crash anything: the dashboard comes up and shows "Connect Garmin".
services:
  splits:
    image: ghcr.io/1-felix/splits:latest
    # To build locally from source instead of pulling the published image,
    # comment the line above and uncomment:
    # build: .
    container_name: splits
    restart: unless-stopped
    init: true
    ports:
      - "8000:8000"
    environment:
      # ── Garmin credentials — pulled from .env by compose (git-ignored) ───────
      GARMIN_EMAIL: ${GARMIN_EMAIL:-}
      GARMIN_PASSWORD: ${GARMIN_PASSWORD:-}
      GARMIN_MFA: ${GARMIN_MFA:-}          # only if your account uses MFA (one-time)

      # ── locale / schedule ───────────────────────────────────────────────────
      TZ: ${TZ:-Europe/Berlin}             # your timezone — drives clock + nightly sync
      SYNC_AT: ${SYNC_AT:-08:00}           # daily auto-sync (local time; after wake, so Garmin has finalised last night's sleep + readiness); "off" to disable
      # SYNC_ON_BOOT: "on"                 # sync once at startup if telemetry is missing/stale

      # ── profile overrides (optional; uncomment to set) ──────────────────────
      # ATHLETE_NAME: "Felix"
      # ATHLETE_AGE: "31"
      # ATHLETE_MAX_HR: "197"
    volumes:
      - splits-data:/data     # garmin-data.js, plan-data.js, token + raw cache

  # ── second athlete: an ingest-fed instance (Health Connect bridge app, no ────
  # Garmin). Same image, its own volume — all divergence is config (design D2).
  # Opt-in via profile so a plain `docker compose up -d` never starts it:
  #   docker compose --profile max up -d
  # If you front this with an SSO reverse proxy (traefik + oidc etc.), exempt
  # POST /api/ingest from the SSO middleware via a second, higher-priority
  # route — the bridge app authenticates with its own bearer token and an SSO
  # redirect would block its pushes. Keep the dashboard routes SSO-gated.
  splits-max:
    image: ghcr.io/1-felix/splits:latest
    container_name: splits-max
    restart: unless-stopped
    init: true
    profiles: ["max"]
    ports:
      - "8001:8000"
    environment:
      TZ: ${TZ:-Europe/Berlin}
      # no Garmin credentials — this instance is fed by POST /api/ingest only
      SYNC_ON_BOOT: "off"
      SYNC_AT: "off"
      SPLITS_INGEST_TOKEN: ${SPLITS_INGEST_TOKEN_MAX:-}   # required: enables /api/ingest + boot build
      ATHLETE_NAME: ${MAX_NAME:-Max}
      ATHLETE_AGE: ${MAX_AGE:-}
      ATHLETE_MAX_HR: ${MAX_MAX_HR:-}
    volumes:
      - splits-max-data:/data   # ingested-runs.json, ingested-rhr.json, plan-data.js, built garmin-data.js

volumes:
  splits-data:
  splits-max-data:
